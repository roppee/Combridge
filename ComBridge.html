<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ComBridge</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #f0f4f8;
    --surface: #ffffff;
    --surface2: #e8eef5;
    --primary: #1a5276;
    --primary-light: #2e86c1;
    --accent: #148f77;
    --accent-light: #1abc9c;
    --text: #1a2332;
    --text-muted: #5d7185;
    --border: #ccd9e3;
    --easy-bg: #eafaf1;
    --easy-border: #a9dfbf;
    --shadow: 0 2px 12px rgba(26,82,118,0.10);
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .icon-svg { display: inline-block; vertical-align: middle; flex-shrink: 0; }

  /* ---- ヘッダー ---- */
  header {
    background: #a8c5a0;
    color: var(--text);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transition: background 0.3s;
  }

  header.user-mode { background: #f5e6a3; }
  header h1 { font-size: 1.1rem; font-weight: 500; letter-spacing: 0.03em; flex: 1; }

  .mode-toggle-btn {
    padding: 4px 10px;
    border: 1.5px solid rgba(255,255,255,0.55);
    border-radius: 20px;
    background: rgba(255,255,255,0.25);
    color: var(--text);
    font-size: 0.75rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    white-space: nowrap;
  }
  .mode-toggle-btn:hover { background: rgba(255,255,255,0.42); }

  .mode-label {
    font-size: 0.82rem;
    font-weight: 700;
    background: rgba(255,255,255,0.55);
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  /* ---- ツールバー（リセット） ---- */
  .toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    justify-content: flex-end;
  }

  .reset-btn {
    padding: 5px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: white;
    color: var(--text-muted);
    font-size: 0.78rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .reset-btn:hover { border-color: #c0392b; color: #c0392b; }

  /* ---- コンテナ ---- */
  .container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    padding: 16px;
    flex: 1;
    max-width: 480px;
    margin: 0 auto;
    width: 100%;
  }

  .panel {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .panel.hidden { display: none; }

  .panel-header {
    padding: 14px 18px 10px;
    border-bottom: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-header .label {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .panel-header .badge {
    font-size: 0.7rem;
    background: var(--primary);
    color: white;
    border-radius: 20px;
    padding: 2px 9px;
    margin-left: auto;
  }

  .panel-header .badge.green { background: var(--accent); }

  .staff-panel .panel-header { background: #eaf2fb; }
  .staff-panel .panel-header .icon { color: var(--primary-light); }

  .user-panel .panel-header { background: #eafaf1; }
  .user-panel .panel-header .icon { color: var(--accent); }

  /* ---- 利用者からの質問通知 ---- */
  .question-notice {
    background: #f0f4f8;
    border-left: 3px solid var(--primary-light);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.88rem;
    color: var(--text);
    line-height: 1.6;
    display: none;
  }
  .question-notice.visible { display: block; }
  .question-notice .notice-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--primary-light);
    margin-bottom: 4px;
    letter-spacing: 0.05em;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .input-area { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .tab-row { display: flex; gap: 6px; }

  .tab-btn {
    flex: 1;
    padding: 8px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 0.82rem;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

  textarea {
    width: 100%;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.95rem;
    line-height: 1.7;
    resize: vertical;
    min-height: 110px;
    background: var(--surface);
    color: var(--text);
    transition: border-color 0.18s;
  }
  textarea:focus { outline: none; border-color: var(--primary-light); }
  textarea::placeholder { color: #aab8c5; }

  .voice-area { display: none; flex-direction: column; gap: 8px; }
  .voice-area.active { display: flex; }
  .text-area-wrap.hidden { display: none; }

  .voice-btn {
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    font-size: 0.95rem;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-weight: 500;
  }
  .voice-btn:hover { background: var(--primary-light); }
  .voice-btn.recording { background: #c0392b; animation: pulse 1.2s infinite; }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .voice-transcript {
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 8px;
    font-size: 0.88rem;
    color: var(--text-muted);
    min-height: 40px;
    line-height: 1.6;
  }

  .send-btn {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: white;
    font-size: 0.95rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.04em;
  }
  .send-btn:hover { background: var(--accent-light); }
  .send-btn:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

  .result-area { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 14px; overflow-y: auto; }

  .result-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 10px;
    padding: 40px 20px;
    text-align: center;
  }
  .result-empty .big-icon { opacity: 0.3; }
  .result-empty p { font-size: 0.85rem; line-height: 1.7; }

  .result-block { display: flex; flex-direction: column; gap: 10px; animation: fadeIn 0.35s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .original-box {
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.82rem;
    color: var(--text-muted);
    border-left: 3px solid var(--border);
  }

  .label-small {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .original-box .label-small { color: #8fa8be; }

  .easy-box { background: var(--easy-bg); border: 1.5px solid var(--easy-border); border-radius: 12px; padding: 16px; }
  .easy-box .label-small { color: var(--accent); margin-bottom: 8px; }
  .easy-text { font-size: 1.15rem; line-height: 1.85; color: var(--text); font-weight: 400; }

  .confirm-row { display: flex; gap: 8px; align-items: center; }
  .confirm-label { font-size: 0.8rem; color: var(--text-muted); flex: 1; }

  .btn-ok {
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: white;
    font-size: 0.85rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .btn-ok:hover { background: var(--accent-light); }

  .btn-retry {
    padding: 8px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: white;
    color: var(--text-muted);
    font-size: 0.85rem;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.18s;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .btn-retry:hover { border-color: var(--primary-light); color: var(--primary); }

  .confirmed-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.78rem;
    color: var(--accent);
    font-weight: 700;
    padding: 4px 10px;
    background: var(--easy-bg);
    border-radius: 20px;
    border: 1px solid var(--easy-border);
  }

  .question-area {
    display: none;
    flex-direction: column;
    gap: 10px;
    padding: 14px;
    border-top: 1.5px solid var(--border);
    background: var(--surface2);
    animation: fadeIn 0.3s ease;
  }
  .question-area.visible { display: flex; }
  .question-area .question-label {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .question-area textarea { min-height: 80px; font-size: 1rem; }

  .question-send-btn {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    font-size: 0.95rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.04em;
  }
  .question-send-btn:hover { background: var(--primary-light); }

  .loading-dots { display: flex; gap: 5px; align-items: center; padding: 8px 0; }
  .loading-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: dot 1.2s infinite; }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot {
    0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ---- APIキーバー ---- */
  .apikey-bar {
    background: #fff8e1;
    border-bottom: 1.5px solid #ffe082;
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.82rem;
    color: #7d6608;
  }
  .apikey-input {
    flex: 1;
    padding: 6px 10px;
    border: 1.5px solid #ffe082;
    border-radius: 7px;
    font-size: 0.82rem;
    font-family: monospace;
    background: white;
    max-width: 340px;
  }
  .apikey-save {
    padding: 6px 14px;
    border: none;
    border-radius: 7px;
    background: #f39c12;
    color: white;
    font-size: 0.8rem;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    cursor: pointer;
  }

  /* ---- サンプル文例 ---- */
  .history-panel { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 14px 16px; grid-column: 1 / -1; }
  .history-title { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
  .history-list { display: flex; flex-wrap: wrap; gap: 7px; }
  .history-chip { padding: 5px 12px; border-radius: 20px; background: var(--surface2); border: 1px solid var(--border); font-size: 0.78rem; color: var(--text-muted); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .history-chip:hover { background: var(--primary); color: white; border-color: var(--primary); }

  /* ---- 会話履歴パネル ---- */
  .conv-history {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .conv-history-header {
    padding: 10px 14px;
    background: var(--surface2);
    border-bottom: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .conv-history-title {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    flex: 1;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .conv-download-btn {
    padding: 4px 10px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    background: white;
    color: var(--text-muted);
    font-size: 0.75rem;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .conv-download-btn:hover { border-color: var(--primary-light); color: var(--primary); }
  .conv-download-btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }

  .conv-entries {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 260px;
    overflow-y: auto;
    padding: 10px 14px;
  }

  .conv-empty { padding: 16px; text-align: center; color: var(--text-muted); font-size: 0.82rem; }

  .conv-entry { display: flex; flex-direction: column; gap: 3px; animation: fadeIn 0.25s ease; }

  .conv-entry-meta { display: flex; align-items: center; gap: 6px; }

  .conv-entry-role {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 1px 7px;
    border-radius: 10px;
  }
  .conv-entry-role.staff   { background: #dbeafe; color: #1e40af; }
  .conv-entry-role.ai      { background: var(--easy-bg); color: var(--accent); }
  .conv-entry-role.user-q  { background: #fef9c3; color: #854d0e; }
  .conv-entry-role.user-ok { background: #dcfce7; color: #166534; }

  .conv-entry-time { font-size: 0.68rem; color: var(--text-muted); }

  .conv-entry-text {
    font-size: 0.82rem;
    color: var(--text);
    line-height: 1.55;
    padding: 6px 10px;
    background: var(--surface2);
    border-radius: 6px;
    white-space: pre-wrap;
    word-break: break-all;
  }
</style>
</head>
<body>

<header id="header">
  <span class="icon">
    <svg class="icon-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
    </svg>
  </span>
  <h1>ComBridge</h1>
  <button class="mode-toggle-btn" id="toggleBtn" onclick="manualToggleMode()">
    <svg class="icon-svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="M16 21l4-4-4-4"/><path d="M20 17H4"/>
    </svg>
    利用者へ
  </button>
  <span class="mode-label" id="modeLabel">
    <svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="8" r="4"/>
    </svg>
    職員モード
  </span>
</header>

<div class="apikey-bar" id="apikeyBar">
  <svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7d6608" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
    <circle cx="12" cy="12" r="3"/>
  </svg>
  <span>Claude APIキー：</span>
  <input class="apikey-input" type="password" id="apikeyInput" placeholder="sk-ant-..." />
  <button class="apikey-save" onclick="saveApiKey()">保存</button>
  <span id="apikeyStatus"></span>
</div>

<div class="toolbar">
  <button class="reset-btn" onclick="resetAll()">
    <svg class="icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
    </svg>
    最初に戻る
  </button>
</div>

<div class="container">

  <!-- 職員パネル -->
  <div class="panel staff-panel" id="staffPanel">
    <div class="panel-header">
      <span class="icon">
        <svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="8" r="4"/>
        </svg>
      </span>
      <span class="label">職員</span>
      <span class="badge">入力</span>
    </div>
    <div class="input-area">

      <div class="question-notice" id="questionNotice">
        <div class="notice-label">
          <svg class="icon-svg" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          利用者からの質問
        </div>
        <div id="questionNoticeText"></div>
      </div>

      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('text', this)">
          <svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="6" width="20" height="13" rx="2"/><path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8"/>
          </svg>
          テキスト入力
        </button>
        <button class="tab-btn" onclick="switchTab('voice', this)">
          <svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
          </svg>
          音声入力
        </button>
      </div>

      <div class="text-area-wrap" id="textAreaWrap">
        <textarea id="inputText" placeholder="例：国民健康保険の更新手続きのご案内です。毎年7月末までに申請が必要です。"></textarea>
      </div>

      <div class="voice-area" id="voiceArea">
        <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()">
          <span id="voiceBtnIcon">
            <svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="22"/>
            </svg>
          </span>
          <span id="voiceBtnText">マイクを押して話す</span>
        </button>
        <div class="voice-transcript" id="voiceTranscript">ここに音声が表示されます</div>
      </div>

      <div class="history-panel" style="padding:10px 12px;grid-column:auto;box-shadow:none;background:var(--surface2);border-radius:10px;">
        <div class="history-title">
          <svg class="icon-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
          </svg>
          よく使う文例
        </div>
        <div class="history-list" id="sampleList"></div>
      </div>

      <button class="send-btn" id="sendBtn" onclick="sendToAI()">やさしい言葉に変換して表示 →</button>
    </div>
  </div>

  <!-- 利用者パネル -->
  <div class="panel user-panel hidden" id="userPanel">
    <div class="panel-header">
      <span class="icon">
        <svg class="icon-svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a5 5 0 0 1 10 0v1.662"/>
        </svg>
      </span>
      <span class="label">利用者</span>
      <span class="badge green">表示</span>
    </div>
    <div class="result-area" id="resultArea">
      <div class="result-empty" id="emptyState">
        <div class="big-icon">
          <svg class="icon-svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </div>
        <p>職員が入力した内容が<br>やさしい言葉で表示されます</p>
      </div>
    </div>
    <div class="question-area" id="questionArea">
      <div class="question-label">
        <svg class="icon-svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        質問があれば入力してください
      </div>
      <textarea id="questionText" placeholder="例：手続きはどこでできますか？"></textarea>
      <button class="question-send-btn" onclick="submitQuestion()">質問する →</button>
    </div>
  </div>

  <!-- 会話履歴 -->
  <div class="conv-history">
    <div class="conv-history-header">
      <div class="conv-history-title">
        <svg class="icon-svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        会話履歴
      </div>
      <button class="conv-download-btn" id="downloadBtn" onclick="downloadHistory()" disabled>
        <svg class="icon-svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        テキストで保存
      </button>
    </div>
    <div class="conv-entries" id="convEntries">
      <div class="conv-empty" id="convEmpty">まだ会話がありません</div>
    </div>
  </div>

</div>

<script>
// ---- SVGアイコン関数 ----
const IC = {
  mic:      (s=20) => `<svg class="icon-svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`,
  stop:     (s=20) => `<svg class="icon-svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" fill="currentColor" stroke="currentColor"/></svg>`,
  user:     (s=16) => `<svg class="icon-svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="8" r="4"/></svg>`,
  userCir:  (s=16) => `<svg class="icon-svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="10" r="3"/><path d="M7 20.662V19a5 5 0 0 1 10 0v1.662"/></svg>`,
  check:    (s=16) => `<svg class="icon-svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>`,
  refresh:  (s=16) => `<svg class="icon-svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>`,
  star:     (s=14) => `<svg class="icon-svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`,
  swap:     (s=13) => `<svg class="icon-svg" width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3 4 7l4 4"/><path d="M4 7h16"/><path d="M16 21l4-4-4-4"/><path d="M20 17H4"/></svg>`,
};

const SWAP_SVG = IC.swap(13);

// ---- APIキー管理 ----
let apiKey = localStorage.getItem('madoguchi_apikey') || '';
if (apiKey) {
  document.getElementById('apikeyInput').value = apiKey;
  document.getElementById('apikeyStatus').innerHTML = IC.check(14) + ' 設定済み';
}

function saveApiKey() {
  apiKey = document.getElementById('apikeyInput').value.trim();
  localStorage.setItem('madoguchi_apikey', apiKey);
  document.getElementById('apikeyStatus').innerHTML = IC.check(14) + ' 保存しました';
  setTimeout(() => document.getElementById('apikeyStatus').innerHTML = '', 2000);
}

// ---- 会話履歴 ----
let conversationLog = [];
const ROLE_LABELS = { staff: '職員', ai: 'AI変換', 'user-ok': '利用者確認', 'user-q': '利用者質問' };

function logEntry(role, content) {
  const now = new Date();
  const time = [now.getHours(), now.getMinutes(), now.getSeconds()]
    .map(n => String(n).padStart(2, '0')).join(':');
  const entry = { time, role, content };
  conversationLog.push(entry);
  const emptyEl = document.getElementById('convEmpty');
  if (emptyEl) emptyEl.style.display = 'none';
  const el = document.createElement('div');
  el.className = 'conv-entry';
  el.innerHTML = `
    <div class="conv-entry-meta">
      <span class="conv-entry-role ${role}">${ROLE_LABELS[role]}</span>
      <span class="conv-entry-time">${time}</span>
    </div>
    <div class="conv-entry-text">${escapeHtml(content)}</div>
  `;
  const entries = document.getElementById('convEntries');
  entries.appendChild(el);
  entries.scrollTop = entries.scrollHeight;
  document.getElementById('downloadBtn').disabled = false;
}

function downloadHistory() {
  if (!conversationLog.length) return;
  const d = new Date();
  const dateStr = d.toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit' });
  let txt = `ComBridge 会話記録\n日付：${dateStr}\n${'='.repeat(40)}\n\n`;
  conversationLog.forEach(e => { txt += `[${e.time}] ${ROLE_LABELS[e.role]}\n${e.content}\n\n`; });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(new Blob([txt], { type: 'text/plain;charset=utf-8' })),
    download: `ComBridge_${d.toISOString().slice(0,10)}.txt`
  });
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// ---- リセット ----
function resetAll() {
  if (!confirm('会話をリセットしますか？')) return;
  conversationLog = [];
  document.querySelectorAll('#resultArea .result-block, #resultArea .loading-dots').forEach(el => el.remove());
  const es = document.getElementById('emptyState');
  if (es) es.style.display = '';
  document.querySelectorAll('#convEntries .conv-entry').forEach(el => el.remove());
  document.getElementById('convEmpty').style.display = '';
  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('voiceTranscript').textContent = 'ここに音声が表示されます';
  switchToStaffMode(null);
}

// ---- モード切替 ----
let currentMode = 'staff';

function switchToUserMode() {
  currentMode = 'user';
  document.getElementById('header').classList.add('user-mode');
  document.getElementById('modeLabel').innerHTML = IC.userCir(16) + ' 利用者モード';
  document.getElementById('toggleBtn').innerHTML = SWAP_SVG + ' 職員へ';
  document.getElementById('staffPanel').classList.add('hidden');
  document.getElementById('userPanel').classList.remove('hidden');
}

function switchToStaffMode(question) {
  currentMode = 'staff';
  document.getElementById('header').classList.remove('user-mode');
  document.getElementById('modeLabel').innerHTML = IC.user(16) + ' 職員モード';
  document.getElementById('toggleBtn').innerHTML = SWAP_SVG + ' 利用者へ';
  document.getElementById('userPanel').classList.add('hidden');
  document.getElementById('staffPanel').classList.remove('hidden');
  document.getElementById('questionArea').classList.remove('visible');
  document.getElementById('questionText').value = '';
  document.getElementById('questionNotice').classList.remove('visible');
  if (question) {
    document.getElementById('questionNoticeText').textContent = question;
    document.getElementById('questionNotice').classList.add('visible');
  }
  document.getElementById('inputText').value = '';
  document.getElementById('inputText').focus();
}

function manualToggleMode() {
  if (currentMode === 'staff') switchToUserMode();
  else switchToStaffMode(null);
}

// ---- タブ切替 ----
function switchTab(mode, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (mode === 'text') {
    document.getElementById('textAreaWrap').classList.remove('hidden');
    document.getElementById('voiceArea').classList.remove('active');
  } else {
    document.getElementById('textAreaWrap').classList.add('hidden');
    document.getElementById('voiceArea').classList.add('active');
  }
}

// ---- 音声入力 ----
let recognition = null;
let isRecording = false;

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('このブラウザは音声入力に対応していません。Chromeをお使いください。');
    return;
  }
  if (isRecording) { recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('voiceBtn').classList.add('recording');
    document.getElementById('voiceBtnIcon').innerHTML = IC.stop(20);
    document.getElementById('voiceBtnText').textContent = '録音中... タップして停止';
    document.getElementById('voiceTranscript').textContent = '聞き取り中...';
  };
  recognition.onresult = (e) => {
    let t = '';
    for (let i = e.resultIndex; i < e.results.length; i++) t += e.results[i][0].transcript;
    document.getElementById('voiceTranscript').textContent = t;
    if (e.results[e.results.length - 1].isFinal) document.getElementById('inputText').value = t;
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('voiceBtn').classList.remove('recording');
    document.getElementById('voiceBtnIcon').innerHTML = IC.mic(20);
    document.getElementById('voiceBtnText').textContent = 'マイクを押して話す';
  };
  recognition.start();
}

// ---- サンプル文例 ----
const samples = [
  '国民健康保険の更新手続きのご案内です。',
  '障害者手帳の等級変更申請が必要です。',
  '介護認定の更新期限が近づいています。',
  '住民票の写しの交付申請について説明します。',
  '特別障害者手当の受給資格を確認します。',
  '自立支援医療費の支給認定申請のご案内です。',
];
samples.forEach(s => {
  const chip = document.createElement('button');
  chip.className = 'history-chip';
  chip.textContent = s.length > 18 ? s.slice(0, 18) + '…' : s;
  chip.title = s;
  chip.onclick = () => {
    document.getElementById('inputText').value = s;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    document.getElementById('textAreaWrap').classList.remove('hidden');
    document.getElementById('voiceArea').classList.remove('active');
  };
  document.getElementById('sampleList').appendChild(chip);
});

// ---- AI変換 ----
async function sendToAI() {
  const text = document.getElementById('inputText').value.trim()
    || document.getElementById('voiceTranscript').textContent.trim();
  if (!text || text === 'ここに音声が表示されます' || text === '聞き取り中...') { alert('テキストを入力してください'); return; }
  if (!apiKey) { alert('APIキーを設定してください'); return; }

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.textContent = '変換中...';

  logEntry('staff', text);

  document.getElementById('questionNotice').classList.remove('visible');
  document.getElementById('emptyState').style.display = 'none';
  switchToUserMode();

  const loadingEl = document.createElement('div');
  loadingEl.className = 'loading-dots';
  loadingEl.innerHTML = '<span></span><span></span><span></span>';
  document.getElementById('resultArea').appendChild(loadingEl);

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `あなたは行政窓口で聴覚障害者・聾唖者の方へ情報を伝えるサポートをするアシスタントです。
職員が話した内容を、以下のルールでやさしい日本語に変換してください。

ルール：
・専門用語や難しい言葉はわかりやすい言葉に置き換える
・短い文に分ける（1文は40字以内が目安）
・重要な数字・日付・期限は必ず残す
・「です・ます」調で丁寧に
・箇条書きが適切な場合は使う
・絵文字を適度に使い、視覚的にわかりやすくする

出力形式：やさしい言葉のみを出力してください。説明や前置きは不要です。`,
        messages: [{ role: 'user', content: text }]
      })
    });
    const data = await response.json();
    loadingEl.remove();
    if (data.error) throw new Error(data.error.message);
    renderResult(text, data.content[0].text);
  } catch (err) {
    loadingEl.remove();
    switchToStaffMode(null);
    const el = document.createElement('div');
    el.style.cssText = 'color:#c0392b;font-size:0.85rem;padding:10px;background:#fdf2f2;border-radius:8px;';
    el.textContent = 'エラー: ' + err.message;
    document.getElementById('resultArea').appendChild(el);
  }

  sendBtn.disabled = false;
  sendBtn.textContent = 'やさしい言葉に変換して表示 →';
}

function renderResult(original, easy) {
  const block = document.createElement('div');
  block.className = 'result-block';
  block.innerHTML = `
    <div class="original-box">
      <div class="label-small">職員の言葉</div>
      ${escapeHtml(original)}
    </div>
    <div class="easy-box">
      <div class="label-small">${IC.star(14)} やさしい言葉</div>
      <div class="easy-text">${formatText(easy)}</div>
    </div>
    <div class="confirm-row">
      <span class="confirm-label">内容は伝わりましたか？</span>
      <button class="btn-retry" onclick="markRetry(this)">${IC.refresh(16)} もう一度</button>
      <button class="btn-ok" onclick="markOk(this)">${IC.check(16)} わかった</button>
    </div>
  `;
  document.getElementById('resultArea').appendChild(block);
  block.scrollIntoView({ behavior: 'smooth', block: 'end' });
  logEntry('ai', easy);
}

function markOk(btn) {
  btn.closest('.confirm-row').innerHTML = `<span class="confirmed-badge">${IC.check(14)} 確認しました</span>`;
  logEntry('user-ok', '内容を確認しました');
  const qa = document.getElementById('questionArea');
  qa.classList.add('visible');
  document.getElementById('questionText').focus();
  qa.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function markRetry(btn) {
  btn.closest('.result-block').style.opacity = '0.4';
  switchToStaffMode(null);
  document.getElementById('inputText').select();
}

function submitQuestion() {
  const q = document.getElementById('questionText').value.trim();
  if (q) logEntry('user-q', q);
  switchToStaffMode(q || null);
}

function formatText(t) { return escapeHtml(t).replace(/\n/g, '<br>'); }
function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
